<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL 证书过期监测 配置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 300% 100%;
      animation: gradient 3s ease infinite;
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 1.1rem;
    }

    .header-actions {
      position: absolute;
      top: 0;
      right: 0;
    }

    .control-panel {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button.btn {
      padding: 12px 24px;
      cursor: pointer;
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      min-width: 120px;
    }

    button.btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
    }

    button.btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    button.btn:hover::before {
      left: 100%;
    }

    button.btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    button.btn:active {
      transform: translateY(0);
    }

    #save {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    #sendTestSMS {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    #saveSmsConfig {
      background: linear-gradient(135deg, #20c997, #0d6efd);
    }

    #logout {
      min-width: auto;
      padding: 10px 16px;
      font-size: 14px;
      background: linear-gradient(135deg, #495057, #212529);
    }

    input.text-input,
    select.text-input {
      width: 100%;
      margin-bottom: 25px;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      padding: 15px 20px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #fff;
    }

    select.text-input {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #6c757d 50%), linear-gradient(135deg, #6c757d 50%, transparent 50%);
      background-position: calc(100% - 22px) 50%, calc(100% - 16px) 50%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    input.text-input:focus,
    select.text-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      transform: translateY(-1px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 20px;
      margin-bottom: 25px;
    }

    .field {
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #495057;
      font-weight: 700;
      font-size: 14px;
    }

    .field .text-input {
      margin-bottom: 0;
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #495057;
      font-weight: 700;
      padding: 12px 0;
    }

    .checkbox-field input {
      width: 18px;
      height: 18px;
      accent-color: #20c997;
    }

    .sms-status {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .sms-status-success {
      color: #0f5132;
      background: #d1e7dd;
      border-color: #badbcc;
    }

    .sms-status-warning {
      color: #664d03;
      background: #fff3cd;
      border-color: #ffecb5;
    }

    .sms-status-muted {
      color: #495057;
      background: #f1f3f5;
      border-color: #dee2e6;
    }

    textarea {
      width: 100%;
      height: 220px;
      margin-bottom: 25px;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      padding: 20px;
      resize: vertical;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.5;
      transition: all 0.3s ease;
      background: #fff;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .progress-section {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .progress-container {
      width: 100%;
      background-color: #f0f2f5;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 15px;
      height: 12px;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s ease;
      border-radius: 12px;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.2) 50%, transparent 70%);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    #progressText {
      text-align: center;
      font-weight: 600;
      color: #667eea;
      font-size: 16px;
    }

    .table-container {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background-color: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }

    th,
    td {
      padding: 16px 20px;
      text-align: left;
      border-bottom: 1px solid #f0f2f5;
    }

    th {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      font-weight: 700;
      color: #495057;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    tbody tr {
      transition: all 0.3s ease;
    }

    tbody tr:hover {
      background-color: #f8f9ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .loading {
      position: relative;
      color: #667eea;
      font-weight: 600;
    }

    .loading::after {
      content: "";
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e1e5e9;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    .status-badge:hover {
      transform: scale(1.05);
    }

    .status-success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status-warning {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }

    .status-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .target-cell {
      font-weight: 600;
      color: #212529;
      word-break: break-all;
    }

    .error-text {
      color: #dc3545;
      font-weight: 600;
      line-height: 1.5;
    }

    .error-detail {
      margin-top: 4px;
      color: #6c757d;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .muted-text {
      color: #6c757d;
    }

    .section-title {
      margin-bottom: 20px;
      color: #495057;
      font-size: 1.2rem;
    }

    .empty-state {
      text-align: center;
      color: #666;
      font-style: italic;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .container {
        margin: 10px;
        padding: 20px;
        border-radius: 16px;
      }

      .header h1 {
        font-size: 2rem;
      }

      .header-actions {
        position: static;
        display: flex;
        justify-content: center;
        margin-top: 16px;
      }

      .button-group {
        flex-direction: column;
        align-items: stretch;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      button.btn {
        width: 100%;
        margin-bottom: 10px;
        min-width: auto;
      }

      .control-panel,
      .progress-section,
      .table-container {
        padding: 20px;
      }

      table {
        font-size: 14px;
      }

      th,
      td {
        padding: 12px 16px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .header p {
        font-size: 1rem;
      }

      th,
      td {
        padding: 10px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>SSL 证书监测</h1>
      <p>轻松监控您的SSL证书状态，及时获得过期提醒</p>
      <div class="header-actions">
        <button type="button" class="btn" id="logout">退出登录</button>
      </div>
    </div>

    <div class="control-panel">
      <h3 class="section-title">配置管理</h3>
      <textarea id="config"
        placeholder="每行格式：域名[:端口]|手机号1,手机号2&#10;&#10;示例：&#10;example.com|13800138000,13900139000&#10;example.com:443|13800138000&#10;subdomain.example.com:8443|13800138000"></textarea>

      <div class="button-group">
        <button type="button" class="btn" id="save">💾 保存配置</button>
      </div>
    </div>

    <div class="control-panel">
      <h3 class="section-title">短信供应商</h3>
      <div id="smsStatus" class="sms-status sms-status-muted">正在读取短信配置...</div>

      <div class="form-grid">
        <label class="checkbox-field field full" for="smsEnabled">
          <input type="checkbox" id="smsEnabled" checked />
          <span>启用短信告警</span>
        </label>

        <div class="field">
          <label for="smsProvider">供应商</label>
          <select id="smsProvider" class="text-input">
            <option value="submail">Submail</option>
            <option value="tencent">腾讯云</option>
            <option value="aliyun">阿里云</option>
            <option value="custom">自定义</option>
          </select>
        </div>

        <div class="field">
          <label for="smsType">短信类型</label>
          <input type="text" id="smsType" class="text-input" placeholder="submail" />
        </div>

        <div class="field full">
          <label for="smsBaseURL">服务地址</label>
          <input type="url" id="smsBaseURL" class="text-input" placeholder="https://sms.example.com" />
        </div>

        <div class="field">
          <label for="smsEndpoint">接口路径</label>
          <input type="text" id="smsEndpoint" class="text-input" placeholder="/sendSMS" />
        </div>

        <div class="field">
          <label for="smsTemplateId">模板 ID</label>
          <input type="text" id="smsTemplateId" class="text-input" placeholder="template-id" />
        </div>

        <div class="field">
          <label for="smsAppid">App ID</label>
          <input type="text" id="smsAppid" class="text-input" placeholder="appid" />
        </div>

        <div class="field">
          <label for="smsAppUUID">App UUID</label>
          <input type="text" id="smsAppUUID" class="text-input" placeholder="test" />
        </div>

        <div class="field">
          <label for="smsAppkey">App Key</label>
          <input type="password" id="smsAppkey" class="text-input" autocomplete="new-password" placeholder="留空保留现有密钥" />
        </div>

        <div class="field">
          <label for="smsAuth">Auth Token</label>
          <input type="password" id="smsAuth" class="text-input" autocomplete="new-password" placeholder="留空保留现有密钥" />
        </div>

        <div class="field">
          <label for="smsTimeout">超时毫秒</label>
          <input type="number" id="smsTimeout" class="text-input" min="1" step="500" placeholder="10000" />
        </div>
      </div>

      <div class="button-group">
        <button type="button" class="btn" id="saveSmsConfig">💾 保存短信配置</button>
      </div>
    </div>

    <div class="control-panel">
      <h3 class="section-title">测试短信</h3>
      <input type="text" id="testPhone" class="text-input" placeholder="测试手机号，多个用逗号分隔，如：13800138000,13900139000" />
      <div class="button-group">
        <button type="button" class="btn" id="sendTestSMS">📱 发送测试短信</button>
      </div>
    </div>

    <div class="progress-section">
      <h3 class="section-title">检测进度</h3>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p id="progressText">等待开始检测...</p>
    </div>

    <div class="table-container">
      <h3 class="section-title">证书状态</h3>
      <table>
        <thead>
          <tr>
            <th>🌐 域名</th>
            <th>📅 起效时间</th>
            <th>⏰ 到期时间</th>
            <th>⚠️ 剩余天数</th>
            <th>📞 通知手机号</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr>
            <td colspan="5" class="empty-state">
              <span class="loading">正在加载配置</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    Date.prototype.Format = function (fmt) {
      var o = {
        "M+": this.getMonth() + 1,                 //月份
        "d+": this.getDate(),                    //日
        "h+": this.getHours() % 12 == 0 ? 12 : this.getHours() % 12, //小时
        "H+": this.getHours(), //小时
        "m+": this.getMinutes(),                 //分
        "s+": this.getSeconds(),                 //秒
        "q+": Math.floor((this.getMonth() + 3) / 3), //季度
        "S": this.getMilliseconds()             //毫秒
      };
      if (/(y+)/.test(fmt))
        fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
      for (var k in o)
        if (new RegExp("(" + k + ")").test(fmt))
          fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
      return fmt;
    }

    const SESSION_EXPIRED = 'SESSION_EXPIRED'

    const apiFetch = (url, options = {}) => {
      return fetch(url, {
        credentials: 'same-origin',
        ...options
      }).then(response => {
        if (response.status === 401) {
          window.location.href = '/login'
          throw new Error(SESSION_EXPIRED)
        }
        return response
      })
    }

    const escapeHtml = value => String(value === undefined || value === null ? '' : value).replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    })[char])

    const stripInlineComment = line => {
      const trimmed = String(line || '').trim()
      if (trimmed.startsWith('//')) return ''

      const match = trimmed.match(/\s+\/\//)
      if (!match) return trimmed
      return trimmed.slice(0, match.index).trim()
    }

    const stripPhoneComment = value => {
      const text = String(value || '').trim()
      const commentIndex = text.indexOf('//')
      return commentIndex === -1 ? text : text.slice(0, commentIndex).trim()
    }

    const normalizePortInput = (value, fallback = 443) => {
      if (value === undefined || value === null || value === '') return fallback

      const raw = String(value).trim()
      if (!/^\d+$/.test(raw)) {
        throw new Error(`端口格式不正确：${raw}。请输入 1-65535 之间的整数。`)
      }

      const port = Number(raw)
      if (!Number.isInteger(port) || port < 1 || port > 65535) {
        throw new Error(`端口超出范围：${raw}。请输入 1-65535 之间的整数。`)
      }
      return port
    }

    const normalizeTargetInput = targetText => {
      const raw = String(targetText || '').trim()
      if (!raw) throw new Error('目标地址不能为空。请输入域名或 IP，例如 example.com 或 example.com:443。')

      const bracketMatch = raw.match(/^\[([^\]]+)](?::(.+))?$/)
      if (bracketMatch) {
        return {
          host: bracketMatch[1].trim(),
          port: normalizePortInput(bracketMatch[2])
        }
      }

      const hasProtocol = /^[a-z][a-z0-9+.-]*:\/\//i.test(raw)
      const hasPathLikePart = /[/?#]/.test(raw)
      if (hasProtocol || hasPathLikePart) {
        let parsed
        try {
          parsed = new URL(hasProtocol ? raw : `https://${raw}`)
        } catch (err) {
          throw new Error(`目标地址格式不正确：${raw}。请输入域名、域名:端口 或 https:// 域名。`)
        }

        if (parsed.protocol && parsed.protocol !== 'https:') {
          throw new Error(`暂不支持 ${parsed.protocol} 地址。SSL 检测目标应为 HTTPS/TLS 服务。`)
        }

        return {
          host: parsed.hostname.replace(/^\[|\]$/g, ''),
          port: normalizePortInput(parsed.port)
        }
      }

      const colonCount = (raw.match(/:/g) || []).length
      let host = raw
      let port = 443
      if (colonCount === 1) {
        const parts = raw.split(':')
        host = parts[0]
        port = normalizePortInput(parts[1])
      }

      host = host.trim().replace(/^\[|\]$/g, '').replace(/\.$/, '')
      if (!host || /[\s\\]/.test(host)) {
        throw new Error(`域名格式不正确：${raw}。请检查是否包含空格、路径或非法字符。`)
      }

      return { host, port }
    }

    const formatTargetLabel = target => {
      const host = target.host.includes(':') ? `[${target.host}]` : target.host
      return target.port === 443 ? host : `${host}:${target.port}`
    }

    const formatDate = value => {
      const date = new Date(value)
      if (Number.isNaN(date.getTime())) return escapeHtml(value)
      return date.Format('yyyy-MM-dd HH:mm:ss')
    }

    const renderErrorRow = (tr, targetLabel, message, phoneList, detail = '', badge = '失败') => {
      tr.innerHTML = `
        <td class="target-cell">${escapeHtml(targetLabel)}</td>
        <td colspan="2">
          <div class="error-text">${escapeHtml(message)}</div>
          ${detail ? `<div class="error-detail">技术细节：${escapeHtml(detail)}</div>` : ''}
        </td>
        <td><span class="status-badge status-error">${escapeHtml(badge)}</span></td>
        <td>${escapeHtml(phoneList.join(', ')) || '<span class="muted-text">未配置</span>'}</td>
      `
    }

    const checkerSSLCertificate = target => {
      return apiFetch(`/api/checkerSSLCertificate?host=${encodeURIComponent(target.host)}&port=${encodeURIComponent(target.port)}`, {
        method: "GET",
        // mode: 'cors',
      }).then(async response => {
        const json = await response.json().catch(() => ({
          code: -1,
          msg: `服务器返回了非 JSON 响应（HTTP ${response.status}）`
        }))
        return json
      })
    }

    const SMS_SECRET_PLACEHOLDER = '********'
    const SMS_FIELD_LABELS = {
      baseURL: '服务地址',
      templateId: '模板 ID',
      appid: 'App ID',
      appkey: 'App Key',
      auth: 'Auth Token'
    }

    const setSmsStatus = (status) => {
      const smsStatus = document.getElementById('smsStatus')
      smsStatus.className = 'sms-status'

      const config = status.config || {}
      if (config.enabled === false) {
        smsStatus.classList.add('sms-status-muted')
        smsStatus.textContent = '短信告警已禁用'
        return
      }

      if (status.configured) {
        smsStatus.classList.add('sms-status-success')
        smsStatus.textContent = '短信供应商配置完整，可发送告警短信'
        return
      }

      const missingFields = (status.missingFields || []).map(field => SMS_FIELD_LABELS[field] || field)
      smsStatus.classList.add('sms-status-warning')
      smsStatus.textContent = missingFields.length
        ? `短信配置未完成：缺少 ${missingFields.join('、')}`
        : '短信配置未完成'
    }

    const setSmsProviderValue = (value) => {
      const providerSelect = document.getElementById('smsProvider')
      const exists = Array.from(providerSelect.options).some(option => option.value === value)
      providerSelect.value = exists ? value : 'custom'
    }

    const fillSmsConfigForm = (config) => {
      document.getElementById('smsEnabled').checked = config.enabled !== false
      setSmsProviderValue(config.provider || 'submail')
      document.getElementById('smsType').value = config.type || config.provider || 'submail'
      document.getElementById('smsBaseURL').value = config.baseURL || ''
      document.getElementById('smsEndpoint').value = config.endpoint || '/sendSMS'
      document.getElementById('smsTemplateId').value = config.templateId || ''
      document.getElementById('smsAppid').value = config.appid || ''
      document.getElementById('smsAppUUID').value = config.appUUID || 'test'
      document.getElementById('smsAppkey').value = config.appkey === SMS_SECRET_PLACEHOLDER ? SMS_SECRET_PLACEHOLDER : ''
      document.getElementById('smsAuth').value = config.auth === SMS_SECRET_PLACEHOLDER ? SMS_SECRET_PLACEHOLDER : ''
      document.getElementById('smsTimeout').value = config.timeout || 10000
    }

    const getSmsConfig = () => {
      apiFetch('/api/sms-config', {
        method: 'GET',
      }).then(response => response.json()).then(json => {
        if (json.code !== 1) {
          alert('获取短信配置失败:' + json.msg)
          return
        }

        fillSmsConfigForm(json.result.config || {})
        setSmsStatus(json.result)
      }).catch(err => {
        if (err.message === SESSION_EXPIRED) return
        const smsStatus = document.getElementById('smsStatus')
        smsStatus.className = 'sms-status sms-status-warning'
        smsStatus.textContent = '获取短信配置失败'
      })
    }

    const getSmsFormData = () => {
      const provider = document.getElementById('smsProvider').value
      return {
        enabled: document.getElementById('smsEnabled').checked,
        provider,
        baseURL: document.getElementById('smsBaseURL').value.trim(),
        endpoint: document.getElementById('smsEndpoint').value.trim() || '/sendSMS',
        templateId: document.getElementById('smsTemplateId').value.trim(),
        appid: document.getElementById('smsAppid').value.trim(),
        appkey: document.getElementById('smsAppkey').value.trim(),
        type: document.getElementById('smsType').value.trim() || provider,
        auth: document.getElementById('smsAuth').value.trim(),
        appUUID: document.getElementById('smsAppUUID').value.trim() || 'test',
        timeout: document.getElementById('smsTimeout').value.trim() || '10000'
      }
    }

    const saveSmsConfig = () => {
      const saveBtn = document.getElementById('saveSmsConfig')
      const originalText = saveBtn.textContent
      saveBtn.textContent = '💫 保存中...'
      saveBtn.disabled = true

      apiFetch('/api/sms-config', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          config: getSmsFormData()
        })
      }).then(response => response.json()).then(json => {
        if (json.code === 1) {
          fillSmsConfigForm(json.result.config || {})
          setSmsStatus(json.result)
          saveBtn.textContent = '✅ 保存成功'
          setTimeout(() => {
            saveBtn.textContent = originalText
            saveBtn.disabled = false
          }, 1500)
        } else {
          alert('保存短信配置失败:' + json.msg)
          saveBtn.textContent = originalText
          saveBtn.disabled = false
        }
      }).catch(err => {
        if (err.message === SESSION_EXPIRED) return
        alert('保存短信配置失败：网络错误')
        saveBtn.textContent = originalText
        saveBtn.disabled = false
      })
    }

    const syncSmsTypeWithProvider = () => {
      const provider = document.getElementById('smsProvider').value
      const smsType = document.getElementById('smsType')
      const knownTypes = ['submail', 'tencent', 'aliyun', 'custom']
      if (!smsType.value.trim() || knownTypes.includes(smsType.value.trim())) {
        smsType.value = provider === 'custom' ? '' : provider
      }
    }

    const getConfig = () => {
      apiFetch('/api/config', {
        method: 'GET',
      }).then(response => response.json()).then(json => {
        if (json.code !== 1) {
          alert('获取配置数据失败:' + json.msg)
          return
        }

        document.getElementById('config').value = json.result
        const lines = json.result.split('\n')
        const progressText = document.getElementById('progressText')
        const progressBar = document.getElementById('progressBar')
        const tbody = document.getElementById('tbody')
        tbody.innerHTML = ''
        progressBar.style.width = '0%'
        let total = 0
        let finished = 0
        let successCount = 0
        let failureCount = 0
        let invalidCount = 0
        const domains = []

        lines.forEach((lineRaw, index) => {
          const line = stripInlineComment(lineRaw)
          if (!line.trim()) return

          const separatorIndex = line.indexOf('|')
          const targetText = separatorIndex === -1 ? line : line.slice(0, separatorIndex).trim()
          const phoneText = separatorIndex === -1 ? '' : stripPhoneComment(line.slice(separatorIndex + 1))
          const phoneList = phoneText ? phoneText.split(',').map(p => p.trim()).filter(p => p) : []

          let target
          let targetLabel
          try {
            target = normalizeTargetInput(targetText)
            targetLabel = formatTargetLabel(target)
          } catch (err) {
            invalidCount++
            const tr = document.createElement('tr')
            renderErrorRow(
              tr,
              `第 ${index + 1} 行`,
              `配置格式错误：${err.message}`,
              phoneList,
              lineRaw,
              '配置错误'
            )
            tbody.appendChild(tr)
            return
          }

          total++
          const rowId = 'row-' + total
          const tr = document.createElement('tr')
          tr.id = rowId
          tr.innerHTML = `
            <td class="target-cell">${escapeHtml(targetLabel)}</td>
            <td colspan="3"><span class="loading">检测中</span></td>
            <td>${escapeHtml(phoneList.join(', ')) || '<span class="muted-text">未配置</span>'}</td>
          `
          tbody.appendChild(tr)
          domains.push({ target, targetLabel, phoneList, rowId })
        })

        if (total === 0) {
          progressText.textContent = invalidCount > 0
            ? `没有可检测的域名，已发现 ${invalidCount} 行配置问题`
            : '未检测到域名'
          if (invalidCount === 0) {
            tbody.innerHTML = `
              <tr>
                <td colspan="5" class="empty-state">暂无配置</td>
              </tr>
            `
          }
          return
        }

        progressText.textContent = `检测进度：0/${total}`

        const updateProgress = () => {
          finished++
          progressText.textContent = `检测进度：${finished}/${total}`
          progressBar.style.width = (finished / total * 100) + '%'
          if (finished === total) {
            const suffix = invalidCount > 0 ? `，配置问题 ${invalidCount} 行` : ''
            progressText.textContent = `检测完成：成功 ${successCount} 个，失败 ${failureCount} 个${suffix}`
          }
        }

        domains.forEach(({ target, targetLabel, phoneList, rowId }) => {
          checkerSSLCertificate(target).then(({ code, msg, result, error }) => {
            const tr = document.getElementById(rowId)
            if (code === 1) {
              const { valid_from, valid_to, days } = result
              let statusClass = 'status-success'
              if (days <= 7) statusClass = 'status-error'
              else if (days <= 30) statusClass = 'status-warning'
              successCount++

              tr.innerHTML = `
                <td class="target-cell">${escapeHtml(targetLabel)}</td>
                <td>${formatDate(valid_from)}</td>
                <td>${formatDate(valid_to)}</td>
                <td><span class="status-badge ${statusClass}">${days} 天</span></td>
                <td>${escapeHtml(phoneList.join(', ')) || '<span class="muted-text">未配置</span>'}</td>
              `
            } else {
              failureCount++
              renderErrorRow(tr, targetLabel, msg || '检测失败', phoneList, error && error.detail)
            }
          }).catch(err => {
            if (err.message === SESSION_EXPIRED) return
            failureCount++
            const tr = document.getElementById(rowId)
            renderErrorRow(tr, targetLabel, '请求失败：网络错误，请检查服务端是否可用。', phoneList, err.message)
          }).finally(updateProgress)
        })
      }).catch(err => {
        if (err.message === SESSION_EXPIRED) return
        alert('获取配置数据失败：网络错误')
      })
    }
    const setConfig = () => {
      const saveBtn = document.getElementById('save')
      const originalText = saveBtn.textContent
      saveBtn.textContent = '💫 保存中...'
      saveBtn.disabled = true

      apiFetch("/api/config", {
        method: "POST",
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          'data': document.getElementById('config').value
        })
      }).then(response => response.json()).then(json => {
        if (json.code === 1) {
          saveBtn.textContent = '✅ 保存成功'
          setTimeout(() => {
            window.location.reload()
          }, 1000)
        } else {
          alert('保存失败:' + json.msg)
          saveBtn.textContent = originalText
          saveBtn.disabled = false
        }
      }).catch(err => {
        if (err.message === SESSION_EXPIRED) return
        alert('保存失败：网络错误')
        saveBtn.textContent = originalText
        saveBtn.disabled = false
      })
    }

    const sendTestSMS = () => {
      const phoneStr = document.getElementById('testPhone').value.trim()
      if (!phoneStr) {
        alert('请输入测试手机号')
        return
      }

      const smsBtn = document.getElementById('sendTestSMS')
      const originalText = smsBtn.textContent
      smsBtn.textContent = '📤 发送中...'
      smsBtn.disabled = true

      const phones = phoneStr.split(',').map(p => p.trim()).filter(p => p)
      apiFetch('/api/testSMS', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phones })
      }).then(response => response.json()).then(json => {
        if (json.code === 1) {
          smsBtn.textContent = '✅ 发送成功'
          setTimeout(() => {
            smsBtn.textContent = originalText
            smsBtn.disabled = false
          }, 2000)
        } else {
          alert('发送失败:' + json.msg)
          smsBtn.textContent = originalText
          smsBtn.disabled = false
        }
      }).catch(err => {
        if (err.message === SESSION_EXPIRED) return
        alert('发送失败：网络错误')
        smsBtn.textContent = originalText
        smsBtn.disabled = false
      })
    }

    const logout = () => {
      fetch('/api/logout', {
        method: 'POST',
        credentials: 'same-origin'
      }).finally(() => {
        window.location.href = '/login'
      })
    }

    window.onload = function () {
      document.getElementById('save').onclick = setConfig
      document.getElementById('saveSmsConfig').onclick = saveSmsConfig
      document.getElementById('smsProvider').onchange = syncSmsTypeWithProvider
      document.getElementById('sendTestSMS').onclick = sendTestSMS
      document.getElementById('logout').onclick = logout
      getSmsConfig()
      getConfig()
    }
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - SSL 证书监测</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-card {
      width: min(100%, 420px);
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.14);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .brand p {
      color: #666;
      font-size: 1rem;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #495057;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      height: 48px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea, #764ba2);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(102, 126, 234, 0.34);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    .error {
      min-height: 22px;
      margin-top: 16px;
      color: #dc3545;
      text-align: center;
      font-weight: 600;
    }

    .error[hidden] {
      display: block;
      visibility: hidden;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px 22px;
        border-radius: 16px;
      }

      .brand h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>
  <main class="login-card">
    <div class="brand">
      <h1>SSL 证书监测</h1>
      <p>请登录后继续</p>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button id="loginButton" type="submit">登录</button>
      <p id="error" class="error" role="alert" hidden>登录失败</p>
    </form>
  </main>

  <script>
    const form = document.getElementById('loginForm')
    const button = document.getElementById('loginButton')
    const error = document.getElementById('error')

    form.addEventListener('submit', event => {
      event.preventDefault()

      error.hidden = true
      button.disabled = true
      button.textContent = '登录中...'

      fetch('/api/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      }).then(async response => {
        const json = await response.json().catch(() => ({}))
        if (!response.ok || json.code !== 1) {
          throw new Error(json.msg || '登录失败')
        }
        window.location.href = '/'
      }).catch(err => {
        error.textContent = err.message || '登录失败'
        error.hidden = false
        button.disabled = false
        button.textContent = '登录'
      })
    })
  </script>
</body>

</html>
